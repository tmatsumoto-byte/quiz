<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>査定 知識テスト</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #f2f2f7; min-height: 100vh; padding: 0; }

  .wrap { width: 100%; max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }

  /* ヘッダー */
  .hdr { margin-bottom: 16px; }
  .hdr h2 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 2px; }
  .hdr p { font-size: 13px; color: #888; }

  /* プログレス */
  .prog-bar { height: 5px; background: #ddd; border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
  .prog-fill { height: 100%; background: #7F77DD; border-radius: 3px; transition: width 0.3s; }

  /* 警告バナー */
  .warn-banner { background: #FCEBEB; border: 1px solid #E24B4A; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #501313; margin-bottom: 12px; display: none; line-height: 1.6; }

  /* フォームカード */
  .form-card { background: #fff; border-radius: 16px; padding: 20px 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .form-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #111; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
  .field input, .field select {
    width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px;
    font-size: 16px; background: #fff; color: #111; appearance: none; -webkit-appearance: none;
  }
  .field input:focus, .field select:focus { outline: none; border-color: #7F77DD; }
  .radio-group { display: flex; gap: 10px; }
  .radio-label {
    flex: 1; text-align: center; font-size: 15px; color: #111; cursor: pointer;
    padding: 14px 10px; border: 1px solid #ddd; border-radius: 10px;
    background: #fff; transition: all 0.12s; user-select: none; font-weight: 500;
  }
  .radio-label.selected { border-color: #7F77DD; background: #EEEDFE; color: #3C3489; }
  .field-err { font-size: 12px; color: #E24B4A; margin-top: 5px; display: none; }
  .start-btn {
    width: 100%; padding: 16px; background: #7F77DD; border: none; border-radius: 12px;
    color: #fff; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 8px;
    letter-spacing: 0.5px;
  }
  .start-btn:active { background: #534AB7; }

  /* クイズカード */
  .card { background: #fff; border-radius: 16px; padding: 18px 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .badge-basic { background: #EAF3DE; color: #27500A; }
  .badge-hard { background: #EEEDFE; color: #3C3489; }

  /* タイマー */
  .timer-wrap { display: flex; align-items: center; gap: 8px; flex: 1; margin-left: 10px; }
  .timer-bar-bg { flex: 1; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
  .timer-bar { height: 100%; background: #7F77DD; border-radius: 3px; transition: width 1s linear; }
  .timer-bar.warn { background: #E24B4A; }
  .timer-num { font-size: 13px; font-weight: 600; color: #888; min-width: 32px; text-align: right; }
  .timer-num.warn { color: #E24B4A; }

  .qtext { font-size: 17px; font-weight: 600; line-height: 1.6; margin-bottom: 18px; color: #111; }

  /* 選択肢 */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .cbtn {
    text-align: left; padding: 16px; border: 1.5px solid #e0e0e0; border-radius: 12px;
    background: #fff; font-size: 15px; cursor: pointer; color: #111; line-height: 1.5;
    transition: background 0.1s; font-family: inherit; width: 100%;
  }
  .cbtn:active:not(:disabled) { background: #f0f0f0; }
  .cbtn.reveal { border-color: #1D9E75; background: #E1F5EE; color: #085041; font-weight: 600; }
  .cbtn.wrong { border-color: #E24B4A; background: #FCEBEB; color: #501313; }
  .cbtn.timeout { border-color: #ddd; background: #f8f8f8; color: #aaa; }

  /* 次へボタン */
  .next-btn {
    width: 100%; padding: 16px; background: #7F77DD; border: none; border-radius: 12px;
    color: #fff; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 4px;
    display: none; font-family: inherit;
  }
  .next-btn:active { background: #534AB7; }

  /* カウンター */
  .ctr { font-size: 13px; color: #888; margin-top: 8px; text-align: center; display: block; }

  /* 完了画面 */
  .finish-wrap { text-align: center; padding: 60px 20px; }
  .finish-icon { font-size: 60px; margin-bottom: 20px; }
  .finish-wrap h3 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 10px; }
  .finish-wrap p { font-size: 15px; color: #888; line-height: 1.8; }
</style>
</head>

  { q: "「桁間違い」の査定金額が来た場合の正しい対応は？", choices: ["DPSに連絡して訂正を依頼する", "そのまま買取に使う", "査定を無効にして再依頼する"], answer: "DPSに連絡して訂正を依頼する" },
  { q: "「製品査定不可・地金業者へ」の査定が来た場合、店舗はどうすべき？", choices: ["取引のある地金業者に問い合わせる", "DPSの査定金額で買取する", "買取を断る"], answer: "取引のある地金業者に問い合わせる" },
  { q: "「本部卸し不可」のお品物の保証期間の扱いは？", choices: ["保証の対象外となる", "通常の10日間保証が適用される", "30日間の保証が適用される"], answer: "保証の対象外となる" },
];

let profile = {}, quiz = [], cur = 0, score = 0, answered = false;
let expSelected = null, timerInterval = null, timeLeft = 60;
let visibilityPenalty = false;

// 不正防止
document.addEventListener('visibilitychange', () => {
  if (document.hidden && quiz.length > 0 && cur < quiz.length) visibilityPenalty = true;
});
window.addEventListener('blur', () => {
  if (quiz.length > 0 && cur < quiz.length) visibilityPenalty = true;
});

function checkPenalty() {
  if (!visibilityPenalty) return false;
  visibilityPenalty = false;
  stopTimer();
  document.getElementById('warn-banner').style.display = 'block';
  setTimeout(() => {
    document.getElementById('warn-banner').style.display = 'none';
    quiz = [];
    showForm();
  }, 2500);
  return true;
}

// タイマー
function startTimer() {
  stopTimer();
  timeLeft = 60;
  updateTimerUI();
  timerInterval = setInterval(() => {
    if (checkPenalty()) return;
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) { stopTimer(); timeoutQ(); }
  }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function updateTimerUI() {
  const bar = document.getElementById('timer-bar');
  const num = document.getElementById('timer-num');
  if (!bar || !num) return;
  bar.style.width = (timeLeft / 60 * 100) + '%';
  num.textContent = timeLeft + 's';
  const warn = timeLeft <= 10;
  bar.className = 'timer-bar' + (warn ? ' warn' : '');
  num.className = 'timer-num' + (warn ? ' warn' : '');
}
function timeoutQ() {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.cbtn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === quiz[cur].answer) btn.classList.add('reveal');
    else btn.classList.add('timeout');
  });
  document.getElementById('next-btn').style.display = 'block';
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// フォーム
function showForm() {
  stopTimer(); quiz = [];
  document.getElementById('subtitle').textContent = '受験者情報を入力してください';
  document.getElementById('prog').style.width = '0%';
  document.getElementById('ctr').textContent = '';
  expSelected = null;
  document.getElementById('main').innerHTML = `
    <div class="form-card">
      <h3>受験者情報</h3>
      <div class="field">
        <label>店舗名</label>
        <input type="text" id="f-store" placeholder="例：買取大吉 ○○店">
        <div class="field-err" id="err-store">店舗名を入力してください</div>
      </div>
      <div class="field">
        <label>氏名</label>
        <input type="text" id="f-name" placeholder="例：山田 太郎">
        <div class="field-err" id="err-name">氏名を入力してください</div>
      </div>
      <div class="field">
        <label>入社から何ヶ月目？</label>
        <select id="f-months">
          <option value="">選択してください</option>
          ${[...Array(12)].map((_,i)=>`<option value="${i+1}">${i+1}ヶ月目</option>`).join('')}
          <option value="13">13ヶ月目以上</option>
        </select>
        <div class="field-err" id="err-months">入社月数を選択してください</div>
      </div>
      <div class="field">
        <label>前職での買取業務経験</label>
        <div class="radio-group">
          <label class="radio-label" id="exp-yes" onclick="selectExp('yes')">あり</label>
          <label class="radio-label" id="exp-no" onclick="selectExp('no')">なし</label>
        </div>
        <div class="field-err" id="err-exp">選択してください</div>
      </div>
      <button class="start-btn" onclick="submitForm()">テストを開始する</button>
    </div>`;
}

function selectExp(val) {
  expSelected = val;
  document.getElementById('exp-yes').className = 'radio-label' + (val==='yes' ? ' selected' : '');
  document.getElementById('exp-no').className = 'radio-label' + (val==='no' ? ' selected' : '');
}

function submitForm() {
  const store = document.getElementById('f-store').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const months = document.getElementById('f-months').value;
  document.getElementById('err-store').style.display = store ? 'none' : 'block';
  document.getElementById('err-name').style.display = name ? 'none' : 'block';
  document.getElementById('err-months').style.display = months ? 'none' : 'block';
  document.getElementById('err-exp').style.display = expSelected ? 'none' : 'block';
  if (!store || !name || !months || !expSelected) return;
  profile = { store, name, months: parseInt(months), exp: expSelected };
  startQuiz();
}

// クイズ
function startQuiz() {
  const isBasic = profile.exp === 'no' && profile.months <= 6;
  if (isBasic) {
    const b = shuffle(basicQ).slice(0,5).map(q=>({...q,level:'basic'}));
    const h = shuffle(hardQ).slice(0,5).map(q=>({...q,level:'hard'}));
    quiz = shuffle([...b,...h]);
  } else {
    quiz = shuffle(hardQ).slice(0,10).map(q=>({...q,level:'hard'}));
  }
  cur = 0; score = 0; answered = false;
  document.getElementById('subtitle').textContent = '1問60秒・全10問';
  render();
}

function render() {
  if (cur >= quiz.length) { showFinish(); return; }
  const q = quiz[cur];
  answered = false;
  document.getElementById('prog').style.width = (cur/quiz.length*100) + '%';
  document.getElementById('ctr').textContent = `${cur+1} / ${quiz.length}`;

  const badge = q.level === 'basic'
    ? '<span class="badge badge-basic">基礎</span>'
    : '<span class="badge badge-hard">難問</span>';

  const choices = shuffle(q.choices).map((c,i) =>
    `<button class="cbtn" id="c${i}" onclick="answer(this)">${c}</button>`
  ).join('');

  document.getElementById('main').innerHTML = `
    <div class="card">
      <div class="card-top">
        ${badge}
        <div class="timer-wrap">
          <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
          <span class="timer-num" id="timer-num">60s</span>
        </div>
      </div>
      <div class="qtext">${q.q}</div>
      <div class="choices">${choices}</div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">次へ →</button>`;

  startTimer();
}

function answer(el) {
  if (answered) return;
  answered = true;
  stopTimer();
  const correct = quiz[cur].answer;
  if (el.textContent === correct) score++;
  document.querySelectorAll('.cbtn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === correct) btn.classList.add('reveal');
    else if (btn === el) btn.classList.add('wrong');
  });
  document.getElementById('next-btn').style.display = 'block';
}

function nextQ() { cur++; render(); }

// 完了
function showFinish() {
  stopTimer();
  document.getElementById('prog').style.width = '100%';
  document.getElementById('ctr').textContent = '';
  quiz = [];
  const isBasic = profile.exp === 'no' && profile.months <= 6;
  const modeLabel = isBasic ? '基礎5問＋難問5問' : '難問10問';
  document.getElementById('main').innerHTML = `
    <div class="finish-wrap">
      <div class="finish-icon">🙏</div>
      <h3>ありがとうございました。</h3>
      <p>このページを閉じてください。</p>
    </div>`;
  sendResult(modeLabel);
}

function sendResult(modeLabel) {
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_URL_HERE') return;
  const now = new Date();
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      date: now.toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' }),
      store: profile.store, name: profile.name,
      months: profile.months, exp: profile.exp === 'yes' ? 'あり' : 'なし',
      mode: modeLabel, score, total: 10,
    }),
  });
}

showForm();
</script>
</body>
